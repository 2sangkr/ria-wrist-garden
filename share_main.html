<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>꿈꾸는 2Sang</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Nanum+Brush+Script&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: #fff; color: #333; }
    a { text-decoration: none; color: inherit; }

    /* ── 헤더 ── */
    header {
      border-bottom: 1px solid #e5e7eb;
      background: #fff;
      position: sticky; top: 0; z-index: 50;
    }
    .header-inner { max-width: 1200px; margin: 0 auto; padding: 0 16px; }
    .header-top {
      display: flex; align-items: center; justify-content: space-between; padding: 12px 0;
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-text .sub { font-size: 10px; letter-spacing: 0.25em; color: #9ca3af; text-transform: uppercase; }
    .logo-text .main { font-size: 22px; font-weight: 700; color: #1f2937; line-height: 1; }
    .header-icons { display: flex; align-items: center; gap: 16px; color: #4b5563; }
    .header-icons a:hover { color: #111; }
    nav {
      display: flex; justify-content: center; gap: 32px;
      border-top: 1px solid #f3f4f6; overflow-x: auto;
    }
    nav a {
      display: block; padding: 12px 0;
      font-size: 13px; font-weight: 500; color: #4b5563;
      border-bottom: 2px solid transparent; white-space: nowrap;
      transition: color 0.15s, border-color 0.15s;
    }
    nav a:hover { color: #111; border-bottom-color: #1f2937; }

    /* ── 배너 ── */
    .banner-wrap { max-width: 1200px; margin: 0 auto; padding: 20px 16px 8px; }
    .banner {
      width: 100%; border-radius: 16px; overflow: hidden; position: relative;
      background: linear-gradient(135deg, #ffe0ec 0%, #fff0f5 50%, #ffd6e8 100%);
      min-height: 160px; display: flex; align-items: center;
    }
    .banner-deco1 { position: absolute; top: 12px; right: 20px; font-size: 80px; opacity: 0.1; user-select: none; }
    .banner-deco2 { position: absolute; bottom: 12px; right: 112px; font-size: 50px; opacity: 0.1; user-select: none; }
    .banner-content { padding: 32px 40px; position: relative; z-index: 1; }
    .banner-content .label { font-size: 11px; letter-spacing: 0.2em; color: #f472b6; text-transform: uppercase; margin-bottom: 8px; }
    .banner-content h2 { font-size: 28px; font-weight: 700; color: #1f2937; line-height: 1.4; margin-bottom: 12px; }
    .banner-content h2 span { color: #ec4899; }
    .banner-btn {
      display: inline-block; background: #fff; color: #1f2937;
      font-size: 12px; font-weight: 500; padding: 8px 20px;
      border-radius: 9999px; box-shadow: 0 1px 3px rgba(0,0,0,.1);
      transition: box-shadow 0.15s;
    }
    .banner-btn:hover { box-shadow: 0 4px 10px rgba(0,0,0,.15); }
    .banner-cards {
      display: none; gap: 12px;
      position: absolute; right: 40px; top: 50%; transform: translateY(-50%);
    }
    .banner-card {
      width: 90px; height: 110px; border-radius: 12px;
      box-shadow: 0 4px 12px rgba(0,0,0,.12);
      display: flex; align-items: flex-end; justify-content: center; padding-bottom: 12px;
    }
    .banner-card span { font-size: 11px; color: rgba(255,255,255,0.8); font-weight: 500; }

    /* ── 메인 텍스트 ── */
    .main-text { padding: 40px 16px; text-align: center; }
    .main-text p { font-family: 'Nanum Brush Script', cursive; font-size: 44px; color: #1f2937; line-height: 1.4; }

    /* ── 크리에이터 그리드 ── */
    .creators { max-width: 1200px; margin: 0 auto; padding: 0 16px 64px; }
    .creators h3 { font-size: 15px; font-weight: 700; color: #1f2937; margin-bottom: 32px; text-align: center; }
    .creator-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px; }
    .creator-item { display: flex; flex-direction: column; align-items: center; gap: 8px; text-align: center; }
    .blob {
      width: 100px; height: 100px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 4px 12px rgba(0,0,0,.12);
      transition: transform 0.2s, box-shadow 0.2s; cursor: pointer;
    }
    .blob:hover { transform: scale(1.08); box-shadow: 0 8px 24px rgba(0,0,0,.18); }
    .blob-empty { border: 2px dashed #d1d5db; background: #f9fafb; box-shadow: none; }
    .blob-empty:hover { transform: scale(1.04); }
    .blob-empty .q { font-size: 28px; color: #d1d5db; transition: color 0.15s; }
    .blob-empty:hover .q { color: #9ca3af; }
    .creator-name { font-size: 13px; font-weight: 500; color: #1f2937; }
    .creator-tags { font-size: 11px; color: #9ca3af; letter-spacing: 0.05em; }
    .creator-empty-label { font-size: 12px; color: #9ca3af; }
    .creator-empty-sub { font-size: 10px; color: #d1d5db; display: none; }
    .btn {
      font-size: 11px; border: 1px solid #d1d5db; color: #6b7280;
      padding: 6px 12px; border-radius: 6px;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      background: transparent; cursor: pointer; display: inline-block;
    }
    .btn:hover { background: #f9fafb; color: #374151; border-color: #9ca3af; }
    .btn-dashed { border-style: dashed; }

    /* ── 반응형 ── */
    @media (min-width: 640px) {
      .header-inner { padding: 0 24px; }
      .creator-grid { grid-template-columns: repeat(4, 1fr); gap: 32px; }
      .blob { width: 90px; height: 90px; }
      .creator-empty-sub { display: block; }
      .main-text p { font-size: 36px; }
    }
    @media (min-width: 768px) {
      .blob { width: 110px; height: 110px; }
      .banner-cards { display: flex; }
      .main-text p { font-size: 44px; }
    }
    @media (max-width: 639px) {
      nav { display: none; }
      .banner-content { padding: 24px; }
      .banner-content h2 { font-size: 18px; }
    }
  </style>
</head>
<body>

    </div>

      <a href="#">홈</a>

  </div>
</header>

<!-- 배너 -->
